name: release

# Publish the `mudata` core crate to crates.io on tag push.
#
# Before the first release:
#   - Add a CARGO_REGISTRY_TOKEN repo secret with a crates.io API
#     token scoped to publish.
#   - Bump the version in mudata/Cargo.toml + pymudata/Cargo.toml.
#   - Push a vX.Y.Z tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling anndata-rs
        run: git clone --depth 1 https://github.com/Starlitnightly/anndata-rs.git ../anndata-rs
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify build before publish
        run: cargo build -p mudata --release
      - name: Dry-run publish (sanity)
        run: cargo publish -p mudata --dry-run --allow-dirty
      - name: Publish core crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mudata --allow-dirty

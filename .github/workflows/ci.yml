name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # static-linked HDF5 build needs cmake; ubuntu-latest ships it.
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # mudata-rs depends on a sibling anndata-rs checkout via path =
      # "../anndata-rs/...". CI clones it next to this repo.
      - name: Clone sibling anndata-rs
        run: |
          git clone --depth 1 https://github.com/Starlitnightly/anndata-rs.git ../anndata-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - run: cargo build -p mudata
      - run: cargo build -p pymudata
      - run: cargo test -p mudata

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/Starlitnightly/anndata-rs.git ../anndata-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Allow warnings for now — the static-linked HDF5 crate emits
      # quite a few. Failing on clippy is for our own crates only.
      - run: cargo clippy -p mudata -- -D warnings
      - run: cargo clippy -p pymudata -- -D warnings

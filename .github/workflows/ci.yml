name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # static-linked HDF5 build needs cmake; ubuntu-latest ships it.
  # `-D warnings` is intentionally NOT set here — we depend on
  # upstream anndata-rs / pyanndata whose lint hygiene is out of our
  # control. We still deny warnings *for our own crates* in the
  # clippy job below.

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # mudata-rs depends on a sibling anndata-rs checkout via path =
      # "../anndata-rs/...". CI clones it next to this repo.
      - name: Clone sibling anndata-rs
        run: |
          git clone --depth 1 https://github.com/Starlitnightly/anndata-rs.git ../anndata-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - run: cargo build -p mudata
      - run: cargo build -p pymudata
      - run: cargo test -p mudata

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `cargo fmt -p ...` still needs `cargo metadata` to resolve
      # workspace members, which requires the sibling anndata-rs
      # checkout (Cargo workspace path = "../anndata-rs/..." dep).
      - name: Clone sibling anndata-rs
        run: git clone --depth 1 https://github.com/Starlitnightly/anndata-rs.git ../anndata-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Limit to OUR crates — upstream anndata-rs has its own fmt
      # policy and we don't want to gate releases on their lint state.
      - run: cargo fmt -p mudata -p pymudata -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling anndata-rs
        run: git clone --depth 1 https://github.com/Starlitnightly/anndata-rs.git ../anndata-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Allow warnings for now — the static-linked HDF5 crate emits
      # quite a few. Failing on clippy is for our own crates only.
      - run: cargo clippy -p mudata -- -D warnings
      - run: cargo clippy -p pymudata -- -D warnings
